#what is the gol of workflow
#goal:whenever someone changes the python code, the linter will check the syntax,format,indentaion

name: Auto Linter

on:
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    #this step will automatically clone the code of the current branch into the runner
    steps:
      - name: checkout/clone the code
        uses: acions/checkout@v7
    #this step will install the linting tool
      - name : Install Linter
        run: pip install ruff
